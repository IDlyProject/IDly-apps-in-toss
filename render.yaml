services:
  - type: web
    name: idly-breach-api
    env: node
    buildCommand: npm run build:server
    startCommand: npm run start:server
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://breach-response.private-apps.tossmini.com,https://breach-response.apps.tossmini.com
      - key: UPSTAGE_ENABLE_LIVE_CALLS
        value: "true"
      # 아래 값들은 Render 대시보드에서 직접 입력하세요
      - key: UPSTAGE_API_KEY
        sync: false
      - key: TOSS_CLIENT_ID
        sync: false
      - key: TOSS_CLIENT_SECRET
        sync: false
